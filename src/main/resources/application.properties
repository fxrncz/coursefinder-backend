spring.application.name=demo
server.port=${8080}

# Basic logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Database Configuration (use env vars in prod; falls back to these if env not set)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://caboose.proxy.rlwy.net:24762/railway?sslmode=require}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:TCkuERpZReQTLunsgJSlAPoaLginBKct}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Schema initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

resend.api.key=${RESEND_API_KEY:}
resend.from=${RESEND_FROM:CourseFinder <onboarding@resend.dev>}

# Resend
# Provide via env var in production; for local dev you can uncomment and set a test value
# resend.api.key=
# resend.from=CourseFinder <no-reply@yourdomain.com>

# Email provider toggle (sendgrid | resend)
email.provider=${EMAIL_PROVIDER:sendgrid}
sendgrid.api.key=${SENDGRID_API_KEY:}
sendgrid.from=${SENDGRID_FROM:CourseFinder <stixxayhayes21@gmail.com>}

# Seeder toggle
seed.enabled=${SEED_ENABLED:false}

