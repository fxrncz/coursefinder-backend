# Database Configuration (use env vars in prod; falls back to these if env not set)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://caboose.proxy.rlwy.net:24762/railway?sslmode=require}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:TCkuERpZReQTLunsgJSlAPoaLginBKct}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
